  width: 80%;
}
.article img {
  width: 80%;
  height: 400px;
  object-fit: cover;
  margin: 0 auto;
}

.article__author {
  font-family: var(--ff--common);
  margin-bottom: 30px;
}

.article__txtContainer {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 40px;
  margin-bottom: 40px;
  font-family: var(--ff--common);
}

.article__txtContainer p {
  width: 80%;
  margin: 20px 0;
  text-align: start;
  color: white;
  font-size: 16px;
  line-height: 20px;
}

.article__txtContainer h1 {
  width: 80%;
  margin: 20px 0;
  color: white;
  font-size: 24px;
  font-weight: 600;
}

.article__txtContainer h2 {
  width: 80%;
  margin: 20px 0;
  color: white;
  font-size: 18px;
  font-weight: 600;
}

.article__txtContainer ul,
.article__txtContainer ol {
  width: 80%;
  margin: 20px 0;
  color: white;
  list-style: disc;
  list-style-position: inside;
}

.article__txtContainer li {
  margin-bottom: 5px;
}

.article__txtContainer a {
  font-family: var(--ff--common);
  width: 80%;
  text-align: start;
  line-break: normal;
  word-wrap: break-word;
  margin-top: 10px;
  color: var(--clr--orange--itrsq);
}
.article__txtContainer a:hover {
  color: grey;
}

/* Auth */

.auth {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.auth__container {
  width: 1440px;
  max-width: 1440px;
  margin: 0 auto;
  z-index: 5;
  padding-bottom: 100px;
}

.auth__form {
  margin: 0 auto;
  width: 50%;
  height: 75%;
  border-radius: 10px;
  background-color: var(--clr--white--transparent);
  border: solid 2px var(--clr--white--transparent);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  margin-bottom: 100px;
  margin-top: 150px;
  z-index: 5;
  position: relative;
}

.auth__form button {
  width: 70%;
}

.auth__form > div:nth-child(1) > h1 {
  margin-bottom: 20px;
}
.auth__form > div:nth-child(2) {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 90%;
  max-width: 300px;
  margin-top: 10px;
}

.auth__form > div:nth-child(2) > p {
  width: 70%;
  font-size: 12px;
  line-height: 16px;
  margin-bottom: 10px;
}

.auth__form > div:nth-child(2) > p > input {
  margin-right: 5px;
}

.auth__form > div:nth-child(2) > label {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 70%;
  position: relative;
}

.auth__form > div:nth-child(2) > label > input {
  padding: 8px 20% 8px 10px;
  width: 100%;
  margin-top: 10px;
  margin-bottom: 30px;
  border-radius: 20px;
  outline: none;
  text-decoration: none;
  font-family: var(--ff--common);
  color: white;
  background-color: var(--clr--white--transparent);
  border: solid 1px var(--clr--white--transparent);
}

.auth__form > div:nth-child(3) {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 90%;
  max-width: 300px;
  margin-top: 10px;
}

.auth__form > div:nth-child(3) > a {
  font-family: var(--ff--common);
  text-decoration: none;
  color: white;
  font-size: 14px;
  margin-top: 15px;
  text-align: center;
  line-height: 18px;
}

.auth__form > div:nth-child(3) > a:hover {
  color: black;
}

.icn-privacy {
  position: absolute;
  right: 1rem;
  top: 2.5rem;
  font-size: 1rem;
  cursor: pointer;
}

/* Settings */

.settings {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.settings__container {
  width: 100%;
  max-width: 1440px;
  padding-top: 50px;
  min-height: 100vh;
  margin: 0 auto;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 140px;
}

.settings__container > h1 {
  width: 80%;
  margin-bottom: 90px;
}
.settings__container h2 {
  margin-bottom: 30px;
  margin-top: 20px;
}
.settings__container > div {
  width: 80%;
  display: flex;
}
.settings__container > div > div:nth-child(1),
.settings__container > div > div:nth-child(2) {
  width: 80%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.settings__container label {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;

  width: 300px;
}

.settings__container input {
  padding: 8px 20% 8px 10px;
  width: 100%;
  margin-top: 10px;
  margin-bottom: 30px;
  border-radius: 20px;
  outline: none;
  text-decoration: none;
  font-family: var(--ff--common);
  color: white;
  background-color: var(--clr--white--transparent);
  border: solid 1px var(--clr--white--transparent);
}

.settings__container button {
  width: 300px;
}

/* Profile */

.projects {
  padding-top: 105px;
  min-height: 100vh;
  min-width: 100vw;
}

.projects__container {
  position: relative;
  min-height: 100vh;
  width: 100%;
  max-width: 1440px;
  padding-top: 50px;
  z-index: 5;
  margin: 0 auto;
}

.projects__preview__container {
  width: 80%;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: flex-start;
  padding-top: 30px;
}

.projects__preview__none {
  width: 100%;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.projects__preview__none > h1 {
  margin-bottom: 40px;
}

.projects__preview {
  font-family: var(--ff--common);
  color: white;
  height: 300px;
  min-width: 300px;
  width: 30%;
  margin: 0 20px;
  background-color: var(--clr--white--transparent);
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  /* cursor: pointer; */
  border: solid 2px var(--clr--white--transparent);
  border-radius: 10px;
}

/* .projects__preview:hover {
  background-color: var(--clr--white--transparent--hover);
} */

.projects__preview h1 {
  text-align: center;
  font-size: 1.5rem;
  font-weight: 600;
}

.projects__preview h1 > span {
  font-weight: 400;
}

.projects__preview h2 {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 600;
}

.projects__preview h2 > span {
  font-weight: 400;
}

/* New Project */

.newProject {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.newProject > h1 {
  margin-bottom: 40px;
}

/* Admin */

.admin {
  min-height: 100vh;
  min-width: 100vw;
  padding-top: 150px;
}

.admin__container {
  max-width: 1440px;
  margin: 0 auto;
  margin-bottom: 100px;
}

.admin__content {
  margin: 0 auto;
  width: 80%;
  margin-top: 50px;
}

.admin__articles {
  width: 100%;
  height: 100%;
}

.admin__form {
  display: flex;
  flex-direction: column;
  color: white;
  font-family: var(--ff--common);
  background-color: var(--clr--white--transparent);
  padding: 50px;
  border: solid 2px var(--clr--white--transparent);
  border-radius: 20px;
}

.admin__form > h1 {
  text-align: center;
  margin-bottom: 30px;
}

.admin__form > label {
  display: flex;
  flex-direction: column;
  font-size: 20px;
}

.admin__form > label > input,
.admin__form > label > textarea {
  border: none;
  border-radius: 5px;
  padding: 5px;

  margin-top: 10px;

/* ANIMATON CLASSES */

/* Text underline grow from middle */

.underline-grow {
  position: relative;
  color: white;
}

.underline-grow::before {
  content: "";
  position: absolute;
  display: block;
  width: 100%;
  height: 2px;
  bottom: 0;
  left: 0;
  background-color: white;
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.underline-grow:hover::before {
  transform: scaleX(1);
}

/* WhatsApp */

/*WhatsApp for desktop */
.whatsapp_float {
  position: fixed;
  width: 60px;
  height: 60px;
  bottom: 50px;
  right: 50px;
  background-color: #25d366;
  color: #fff;
  border-radius: 50px;
  text-align: center;
  font-size: 30px;
  box-shadow: 2px 2px 3px #999;
  z-index: 100;
  display: none;
}

.whatsapp_float:hover {
  transform: scale(1.2);

  transition: transform 0.3s ease;
}

/*WhatsApp for mobile */
@media screen and (max-width: 767px) {
  .whatsapp_float {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 46px;
    height: 46px;
    bottom: 2rem;
    right: 2rem;
    font-size: 30px;
